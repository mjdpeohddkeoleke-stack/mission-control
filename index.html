<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Mission Control - OpenClaw Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* PIN Overlay */
        #pin-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .pin-box {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .pin-box h2 { margin-bottom: 20px; color: #00d4ff; }
        .pin-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .pin-input input {
            width: 50px;
            height: 60px;
            font-size: 1.5rem;
            text-align: center;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
        }
        .pin-input input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .pin-error {
            color: #ff4444;
            margin-top: 10px;
            display: none;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0,212,255,0.1);
            border-radius: 20px;
            border: 1px solid rgba(0,212,255,0.3);
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .refresh-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .refresh-btn:hover {
            background: rgba(0,212,255,0.2);
            border-color: #00d4ff;
        }
        .refresh-btn.spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        /* Cards */
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .card-icon { font-size: 1.5rem; }
        
        /* Active Now */
        .active-item {
            background: rgba(0,212,255,0.1);
            border-left: 3px solid #00d4ff;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .active-item h3 { color: #00d4ff; margin-bottom: 8px; }
        .active-item .meta { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        .no-data {
            color: rgba(255,255,255,0.4);
            text-align: center;
            padding: 40px;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4ff;
        }
        .stat-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin-top: 4px;
        }
        
        /* Cron Jobs */
        .cron-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .cron-info { flex: 1; }
        .cron-name { font-weight: 500; margin-bottom: 4px; }
        .cron-schedule { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        .cron-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .status-ok { background: rgba(0,255,136,0.2); color: #00ff88; }
        .status-paused { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-error { background: rgba(255,68,68,0.2); color: #ff4444; }
        
        /* Action Required */
        .action-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid;
        }
        .action-item.high { border-left-color: #ff4444; }
        .action-item.medium { border-left-color: #ffc107; }
        .action-item.low { border-left-color: #00d4ff; }
        .action-priority {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .priority-high { background: rgba(255,68,68,0.2); color: #ff4444; }
        .priority-medium { background: rgba(255,193,7,0.2); color: #ffc107; }
        .priority-low { background: rgba(0,212,255,0.2); color: #00d4ff; }
        
        /* Recent Activity */
        .activity-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .activity-time {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            min-width: 80px;
        }
        .activity-event { color: rgba(255,255,255,0.9); }
        
        /*
